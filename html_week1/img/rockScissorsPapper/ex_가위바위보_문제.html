<!DOCTYPE html>
<html lang="ko">
<head>
<style>    /* html 안에서 css 쓰겠다, 이페이지모양을 이렇게 할게요 */
	body { text-align:center} /*화면전체를 글자가운데로*/
	span { font-size: 30px;}   /*글자크기*/
	#vs_id { font-size: 100px; color: red;}   /*글자크기엄청크게랑 빨간색*/
</style>
<meta charset = "UTF-8">
<title> 가위바위보 </title>
</head>
<body>
<script>
	document.write("<h1>컴퓨터 가위, 바위, 보 맞추기</h1>");
	let game = prompt("가위, 바위, 보 중 선택하세요?", "가위"); //팝업창
	let com = Math.ceil( Math.random() * 3 ); //1,2,3
	let userNum;
	if(game=='가위'){
		userNum = 1;
	}else if(game=='바위'){
		userNum=2;
	}else if(game=='보'){
		userNum=3;
	}else{
		alert('잘못 입력!!');
		location.reload(); //f5
	}
	console.log('컴퓨터:',com, '사용자:',userNum);
	let str=`<div>
			<span>
				<span>com<img src="./images/math_com_${com}.jpg"></span>
				<span id="vs_id">VS</span>
				<span><img src="./images/math_user_${userNum}.jpg" alt="">user</span>
			</span>
		</div>`;
	document.write(str);
	//가위바위보 계산!
	//이기는,지는,비기는 조건을 생각해보세요!(가위:1,바위:2,보:3)
	//그리고 그 각상황에 맞는 img 출력
	
</script>

</body>
		
	

</html>
