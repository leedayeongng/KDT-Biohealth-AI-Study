<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구구단!</title>
</head>
<body>
    <h1>for문 구구단</h1>
    <hr>
    <script>
        // 사용자에게 단을 입력 받아 출력하시오!
        let dan = prompt("몇단!?");
        document.write("<h2>구구단"+dan+"단<h2>");
        console.log(dan,typeof(dan));
        console.log(dan*1, typeof(dan*1));
        //개행 enter 는 <br>

        for(let i = 1;i <= 9; i++){
            console.log(i);
            document.write(dan + 'x' + i + '=' + (dan *i)+'<br>');
        }
    </script>
    
</body>
</html>
