<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="http://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200">
    <!-- text-3xl 글자 크기 font-bold 굵기 blue 색상-->
    <h1 class="text-3xl font-bold text-blue-500">Hello Tailwind</h1>
    <div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow">
        <!--mx-auto 가운데정렬
            p-6 padding
            rounded-lg 둥근모서리
            shadow 그림자
            -->
        <h2 class="text-xl font-semibold mb-2">카드제목</h2>
        <p class="text-gray-600">설명내용</p>
    </div>
   <button class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-700">
    버튼
</button>
    <!-- grid-cols-3 3칸그리드-->
    <div class="grid grid-cols-3 gap-4">
        <div class="bg-blue-200 p-4">1</div>
        <div class="bg-blue-200 p-4">2</div>
        <div class="bg-blue-200 p-4">3</div>
    </div>
    <!-- justify- 가로정렬 items 세로 정렬-->
    
    <div class="flex justify-between items-center bg-gray-200 p-4">      
        <div class="bg-red-200 p-4">1</div>
    </div>


</body>
</html>
