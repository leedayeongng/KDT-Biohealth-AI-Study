<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서의 동적구성</title>
    <script>
        function fn_create(){
            let newDiv = document.createElement('div');
            newDiv.setAttribute('class','myDiv');
            newDiv.innerHTML = '새로운 div';
            newDiv.style.backgroundColor='yellow';
            //newDiv에 자식요소로 버튼(x)dmf aksemfrh
            //x를 클릭하면 newDive가 삭제되도록
            console.log(newDiv);
            //이벤트 리스너에 삭제기능추가
            newDiv.ondblclick = function(){
                //this <-- new dive
                //this.parentelement <--부모
                console.log(this.parentElement);
                //부모에서 나를 삭제
                this.parentElement.removeChild(this);
            }
            document.body.appendChild(newDiv);
           
        }
    </script>
</head>
<body>
    <h3>버튼을 누르면 생성됨</h3>
    <hr>
    <button type="button" onclick="fn_create();">div 생성</button>
</body>
</html>
