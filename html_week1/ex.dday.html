<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d-day</title>
    <script src="./js/dday.js"></script>
    <script>
        function fn_change(){
            //getElemnetById 아이디로 엘리멘트를 찾음.(input에는 value 속성이 있음)
            let dday=document.getElementById('dday').value;
            let day = document.getElementById('day').value;
            let user_dday = fn_dday(dday,parseInt(day));
            console.log(user_dday);
            document.getElementById('view').innerHTML =
                `${dday}로 부터 <br> ${day}일 기념일은 <br> ${user_dday}일 입니다.`;

        }
    </script>
</head>
<body>
    <h3>기념일 계산기</h3>
    <form action="#">
        <label for="">기념일</label>    
        <input type="date" id="dday">
        <input type="text" id="day" placeholder="몇일?">
        <input type="button" value="계산" onclick="fn_change()">
    </form>
    <div id="view"></div>
</body>
</html>
