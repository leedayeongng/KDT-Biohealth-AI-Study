<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>파이썬 밸런스 게임 - 시작</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f1f5f9;
        }

        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background-color: #4F46E5;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #4338ca;
        }

        .error {
            color: #dc2626;
            font-size: 14px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚖️ 밸런스 게임</h1>
        <p>직접 만드는 추천 시스템!</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('start') }}" method="POST">
            <input type="text" name="username" placeholder="이름을 입력하세요" required>
            <button type="submit">시작하기 (DB 생성/조회)</button>
        </form>
    </div>
</body>

</html>
