<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>밸런스 게임</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            color: #1e293b;
        }

        .question-card {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #4F46E5;
        }

        .category {
            font-size: 12px;
            color: #64748b;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        label {
            background: white;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        label:hover {
            border-color: #cbd5e1;
        }

        input[type="radio"] {
            margin-right: 10px;
        }

        input[type="radio"]:checked+span {
            font-weight: bold;
            color: #4F46E5;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: #059669;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🤔 밸런스 게임</h1>

        <form action="{{ url_for('submit') }}" method="POST">
            {% for q in questions %}
            <div class="question-card">
                <span class="category">[{{ q.category }}] {{ q.code }}</span>
                <div class="options">
                    <label>
                        <input type="radio" name="q_{{ q.id }}" value="1" required>
                        <span>A. {{ q.option_a }}</span>
                    </label>
                    <label>
                        <input type="radio" name="q_{{ q.id }}" value="2" required>
                        <span>B. {{ q.option_b }}</span>
                    </label>
                </div>
            </div>
            {% endfor %}

            <button type="submit">내 응답 저장하기 (DB)</button>
        </form>
    </div>
</body>

</html>
