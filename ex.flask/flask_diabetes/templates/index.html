<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>헬스케어 시뮬레이터</title>
    <!-- 심플하고 예쁜 디자인을 위해 Tailwind CSS를 활용합니다 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        <!-- 상단 헤더 -->
        <div class="bg-indigo-600 px-6 py-8 text-center text-white">
            <h2 class="text-2xl font-bold mb-1">헬스케어 진단</h2>
            <p class="text-indigo-200 text-sm">당뇨병 예측 시뮬레이션</p>
        </div>
        <div class="p-6">
            <!-- 파이썬에서 결과(result)가 넘어왔을 때만 보여지는 영역 -->
            {% if result %}
            <div
                class="mb-6 p-4 rounded-xl border {{ 'bg-red-50 border-red-200 text-red-700' if result_class == 'danger' else 'bg-green-50 border-green-200 text-green-700' }} transition-all duration-500 transform translate-y-0 opacity-100 animate-[fadeIn_0.5s_ease-out]">
                <div class="flex items-center gap-3 mb-2">
                    {% if result_class == 'danger' %}
                    <!-- 경고 아이콘 (심플한 SVG) -->
                    <svg class="w-6 h-6 text-red-500 flex-shrink-0" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                    {% else %}
                    <!-- 성공 아이콘 (심플한 SVG) -->
                    <svg class="w-6 h-6 text-green-500 flex-shrink-0" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    {% endif %}
                    <h4 class="font-bold text-lg leading-tight">{{ result }}</h4>
                </div>
                <p class="text-sm opacity-90 ml-9">예측 확률: <span class="font-bold text-base">{{ prob }}</span></p>
            </div>
            {% endif %}

            <!-- 데이터 입력 폼 -->
            <form method="POST" class="space-y-4">

                <!-- 공복 혈당 -->
                <div>
                    <label for="glucose"
                        class="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-1.5">
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z">
                            </path>
                        </svg>
                        공복 혈당 <span class="text-slate-400 font-normal text-xs">(mg/dL)</span>
                    </label>
                    <input type="number" step="0.1" name="glucose" id="glucose" value="{{ glucose }}" required
                        class="block w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-2.5 text-slate-900 border focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-200 outline-none transition-all placeholder:text-slate-400"
                        placeholder="예: 120 (정상: 70~100)">
                </div>

                <!-- 이완기 혈압 -->
                <div>
                    <label for="blood_pressure"
                        class="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-1.5">
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                            </path>
                        </svg>
                        이완기 혈압 <span class="text-slate-400 font-normal text-xs">(mm Hg)</span>
                    </label>
                    <input type="number" step="0.1" name="blood_pressure" id="blood_pressure"
                        value="{{ blood_pressure }}" required
                        class="block w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-2.5 text-slate-900 border focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-200 outline-none transition-all placeholder:text-slate-400"
                        placeholder="예: 70">
                </div>

                <!-- 체질량지수 -->
                <div>
                    <label for="bmi" class="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-1.5">
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3">
                            </path>
                        </svg>
                        체질량지수 <span class="text-slate-400 font-normal text-xs">(BMI)</span>
                    </label>
                    <input type="number" step="0.1" name="bmi" id="bmi" value="{{ bmi }}" required
                        class="block w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-2.5 text-slate-900 border focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-200 outline-none transition-all placeholder:text-slate-400"
                        placeholder="예: 25.5">
                </div>

                <!-- 연령 -->
                <div>
                    <label for="age" class="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-1.5">
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        연령 <span class="text-slate-400 font-normal text-xs">(Age)</span>
                    </label>
                    <input type="number" name="age" id="age" value="{{ age }}" required
                        class="block w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-2.5 text-slate-900 border focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-200 outline-none transition-all placeholder:text-slate-400"
                        placeholder="예: 45">
                </div>

                <!-- 제출 버튼 -->
                <div class="pt-4 pb-2">
                    <button type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 px-4 rounded-xl transition-colors duration-200 shadow-md hover:shadow-lg flex justify-center items-center gap-2">
                        <span>결과 분석하기</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7">
                            </path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
