<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Session Login Demo{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
<div class="mx-auto max-w-5xl px-6 py-10">
    <header class="mb-8 rounded-3xl border border-emerald-400/20 bg-emerald-400/5 p-6">
        <p class="text-sm uppercase tracking-[0.3em] text-emerald-300">1. Session Login</p>
        <h1 class="mt-2 text-3xl font-bold">서버 세션 기반 로그인 프로젝트</h1>
        <p class="mt-3 text-sm text-slate-300">같은 <code>member</code> 테이블을 사용하고, 로그인 상태는 서버 세션에서 관리합니다.</p>
    </header>
    {% if messages %}<div class="mb-6 space-y-3">{% for message in messages %}<div class="rounded-2xl border border-white/10 bg-white/10 px-4 py-3 text-sm">{{ message }}</div>{% endfor %}</div>{% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
