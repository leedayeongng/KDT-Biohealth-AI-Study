<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단일 페이지 웹 애플리케이션 (SPA) CRUD</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        .form-group { margin-bottom: 10px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        button.delete-btn { background-color: #dc3545; margin-left: 10px; }
        button.delete-btn:hover { background-color: #c82333; }
        button.edit-btn { background-color: #28a745; margin-left: 10px; }
        button.edit-btn:hover { background-color: #218838; }
        #item-list { margin-top: 20px; }
        .item { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 4px; background-color: #fafafa; display: flex; justify-content: space-between; align-items: center; }
        .item-details { display: flex; flex-direction: column; }
        .item-title { font-weight: bold; font-size: 1.1em; color: #007bff; }
        .item-meta { font-size: 0.9em; color: #555; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 아이템 관리 (SPA)</h1>

        <div style="background-color: #e9ecef; padding: 15px; border-radius: 6px; margin-bottom: 20px;">
            <h3 style="margin-top: 0;" id="form-title">새 아이템 추가</h3>
            <div class="form-group"><input type="number" id="item-id" placeholder="ID (숫자)"></div>
            <div class="form-group"><input type="text" id="item-name" placeholder="아이템 이름"></div>
            <div class="form-group"><input type="text" id="item-desc" placeholder="상세 설명 (선택사항)"></div>
            <div class="form-group"><input type="number" step="0.01" id="item-price" placeholder="가격"></div>
            <button id="submit-btn" onclick="submitForm()">아이템 추가</button>
            <button id="cancel-btn" onclick="resetForm()" style="display:none; background-color:#6c757d;">취소</button>
        </div>

        <h2>등록된 아이템 목록</h2>
        <div id="item-list">
            <!-- 아이템 영역 -->
        </div>
    </div>
    <script src="app.js?v=2"></script>
</body>
</html>
