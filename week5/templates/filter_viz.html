<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Filter Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        select {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ddd;
            min-width: 250px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            background: #e9ecef;
            transition: 0.3s;
        }

        button.active {
            background: #4a90e2;
            color: white;
            font-weight: bold;
        }

        button:hover:not(.active) {
            background: #dee2e6;
        }

        .grid-display {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .image-card {
            flex: 1;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .image-card h3 {
            background: #f1f3f5;
            margin: 0;
            padding: 10px;
            font-size: 1.1em;
            border-bottom: 1px solid #eee;
        }

        .image-card img {
            width: 100%;
            height: auto;
            display: block;
            max-height: 500px;
            object-fit: contain;
            background: #fafafa;
        }

        /* Kernel Visualization */
        .kernel-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .kernel-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            background: #444;
            padding: 5px;
            border-radius: 5px;
        }

        .kernel-cell {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #333;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.2em;
        }

        .loading {
            text-align: center;
            color: #999;
            margin: 50px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>✨ Image Filter Visualizer & Kernel</h1>

        <div class="controls">
            <div>
                <label for="imageSelect">이미지:</label>
                <select id="imageSelect" onchange="runFilter()">
                    <option value="">이미지를 선택하세요...</option>
                    {% for img in images %}
                    <option value="{{ img }}">{{ img }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="btn-group">
                <button class="filter-btn active" onclick="setFilter('original')"
                    data-filter="original">Original</button>
                <button class="filter-btn" onclick="setFilter('blur')" data-filter="blur">Blur (흐리게)</button>
                <button class="filter-btn" onclick="setFilter('sharpen')" data-filter="sharpen">Sharpen (선명하게)</button>
                <button class="filter-btn" onclick="setFilter('edge')" data-filter="edge">Edge (엣지)</button>
            </div>
        </div>

        <div id="contentArea">
            <div class="loading">이미지를 선택하고 필터를 적용해보세요.</div>
        </div>
    </div>

    <script>
        let currentFilter = 'original';

        function setFilter(filterName) {
            currentFilter = filterName;

            // UI 업데이트
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`button[data-filter="${filterName}"]`).classList.add('active');

            runFilter();
        }

        async function runFilter() {
            const filename = document.getElementById('imageSelect').value;
            if (!filename) return;

            const contentDiv = document.getElementById('contentArea');
            // 로딩 표시 (이미지가 있으면 내용 유지하면서 오버레이를 띄우는 게 좋지만 간단하게 처리)
            // contentDiv.innerHTML = '<div class="loading">Processing...</div>';

            try {
                const formData = new FormData();
                formData.append('filename', filename);
                formData.append('filter', currentFilter);

                const response = await fetch('/api/filter', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.error) {
                    contentDiv.innerHTML = `<div style="color:red; text-align:center;">Error: ${data.error}</div>`;
                    return;
                }

                // 커널 HTML 생성
                let kernelGridHtml = '';
                if (data.kernel && data.kernel.length === 3) {
                    data.kernel.forEach(row => {
                        row.forEach(val => {
                            // 소수점 처리 등
                            const displayVal = Number.isInteger(val) ? val : val.toFixed(2);
                            kernelGridHtml += `<div class="kernel-cell">${displayVal}</div>`;
                        });
                    });
                } else {
                    kernelGridHtml = '<div style="color:#aaa; padding:20px;">No Kernel (Original)</div>';
                }

                contentDiv.innerHTML = `
                    <div class="grid-display">
                        <div class="image-card">
                            <h3>Original</h3>
                            <img src="${data.original}" alt="Original">
                        </div>
                        
                        <div class="image-card">
                            <h3>Filtered: ${currentFilter.toUpperCase()}</h3>
                            <img src="${data.filtered}" alt="Filtered">
                        </div>
                    </div>

                    <div class="kernel-box">
                        <h3 style="margin-top:0; margin-bottom:15px;">Applied 3x3 Kernel (Matrix)</h3>
                        <div class="kernel-grid" style="${data.kernel ? '' : 'display:none;'}">
                            ${kernelGridHtml}
                        </div>
                        ${!data.kernel ? '<p>원본 이미지는 필터 연산이 적용되지 않습니다.</p>' : ''}
                        ${currentFilter === 'blur' ? '<p style="margin-top:10px; font-size:0.9em; color:#bdc3c7;">모든 값을 더해서 평균을 냅니다 (1/9)</p>' : ''}
                        ${currentFilter === 'sharpen' ? '<p style="margin-top:10px; font-size:0.9em; color:#bdc3c7;">중앙을 강조하고 주변을 뺍니다</p>' : ''}
                        ${currentFilter === 'edge' ? '<p style="margin-top:10px; font-size:0.9em; color:#bdc3c7;">값의 변화량(Gradient)을 계산합니다</p>' : ''}
                    </div>
                `;

            } catch (e) {
                contentDiv.innerHTML = `<div style="color:red; text-align:center;">Error: ${e}</div>`;
            }
        }
    </script>
</body>

</html>
